{% extends 'ecommerce/base.html' %}

{% block title %}Login - GlowCart{% endblock %}

{% block extra_css %}
<style>
    .auth-container {
        max-width: 450px;
        margin: 40px auto;
        background: white;
        padding: 50px;
        border-radius: 24px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
        border: 1px solid var(--border);
    }

    .auth-header {
        text-align: center;
        margin-bottom: 40px;
    }

    .auth-header h1 {
        font-size: 2.25rem;
        margin-bottom: 10px;
    }

    .input-icon-wrapper {
        position: relative;
    }

    .input-icon-wrapper i {
        position: absolute;
        left: 18px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-muted);
        pointer-events: none;
    }

    .input-icon-wrapper .form-control {
        padding-left: 50px;
    }

    .btn-auth {
        width: 100%;
        justify-content: center;
        padding: 18px;
        font-size: 1.1rem;
        margin-top: 10px;
        border-radius: 12px;
    }

    .auth-footer {
        text-align: center;
        margin-top: 30px;
        padding-top: 30px;
        border-top: 1px solid var(--border);
        font-size: 0.95rem;
        color: var(--text-muted);
    }

    .auth-footer a {
        color: var(--primary);
        font-weight: 700;
        text-decoration: none;
    }
</style>
{% endblock %}

{% block content %}
<div
    style="display: flex; justify-content: center; align-items: center; min-height: calc(100vh - 250px); padding: 40px 0;">
    <div class="auth-container" style="margin: 0; width: 100%;">
        <div class="auth-header">
            <h1>Sign <span>In</span></h1>
            <p style="color: var(--text-muted)">Please enter your details to login</p>
        </div>

        <form method="POST" action="{% url 'ecommerce:login' %}">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">Username</label>
                <div class="input-icon-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" name="username" id="username" class="form-control"
                        placeholder="Enter your username" required>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-icon-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="password" id="password" class="form-control" placeholder="••••••••"
                        required>
                </div>
            </div>

            <div style="display: flex; justify-content: flex-end; margin-bottom: 24px;">
                <a href="{% url 'ecommerce:forgot_password' %}"
                    style="color: var(--text-muted); font-size: 0.85rem; text-decoration: none; font-weight: 500; transition: color 0.3s;"
                    onmouseover="this.style.color='var(--primary)'"
                    onmouseout="this.style.color='var(--text-muted)'">Forgot Password?</a>
            </div>

            <button type="submit" class="btn btn-primary btn-auth"
                style="transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);">
                Sign In
            </button>
        </form>

        <div class="auth-footer">
            Don't have an account? <a href="{% url 'ecommerce:register' %}">Create Account</a>
        </div>
    </div>
</div>
{% endblock %}
