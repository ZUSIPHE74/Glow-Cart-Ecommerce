{% extends 'ecommerce/base.html' %}

{% block title %}Recovery - GlowCart{% endblock %}

{% block extra_css %}
<style>
    .auth-container {
        max-width: 450px;
        margin: 40px auto;
        background: white;
        padding: 40px;
        border-radius: 24px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
        border: 1px solid var(--border);
    }

    .auth-header {
        text-align: center;
        margin-bottom: 30px;
    }

    .auth-header h1 {
        font-size: 2rem;
        margin-bottom: 10px;
    }

    .subtitle {
        color: var(--text-muted);
        font-size: 0.9rem;
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 500;
        font-size: 0.9rem;
    }

    .form-control {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: 1px solid var(--border);
        transition: all 0.3s;
    }

    .form-control:focus {
        border-color: var(--primary);
        outline: none;
        box-shadow: 0 0 0 4px rgba(var(--primary-rgb), 0.1);
    }

    .btn-block {
        width: 100%;
        padding: 14px;
        border-radius: 12px;
        font-weight: 600;
    }

    .reset-form {
        margin-top: 30px;
        padding-top: 30px;
        border-top: 1px solid var(--border);
    }

    .success-msg { color: #10b981; margin-top: 15px; font-size: 0.9rem; }
    .error-msg { color: #ef4444; margin-top: 15px; font-size: 0.9rem; }

    .switch-auth {
        text-align: center;
        margin-top: 25px;
        font-size: 0.9rem;
        color: var(--text-muted);
    }

    .hidden { display: none; }
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-header">
        <h1>Recovery</h1>
        <p class="subtitle">Answer your security question to reset your password</p>
    </div>

    <!-- Verification Form -->
    <div id="verify-section">
        <form id="verify-form">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" class="form-control" required placeholder="Enter your account email">
            </div>

            <div class="form-group">
                <label>Security Question</label>
                <select id="security_question" class="form-control" required>
                    <option value="" disabled selected>Select your question</option>
                    {% for val, label in questions %}
                        <option value="{{ val }}">{{ label }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label>Security Answer</label>
                <input type="text" id="security_answer" class="form-control" required placeholder="Type the exact answer">
            </div>

            <button type="submit" class="btn btn-primary btn-block">Verify Answer</button>
        </form>
    </div>

    <!-- Reset Form (Hidden until verified) -->
    <div id="reset-section" class="hidden">
        <form id="reset-form" class="reset-form">
            <div class="form-group">
                <label>New Password</label>
                <input type="password" id="new_password" class="form-control" required placeholder="Create a new password">
            </div>

            <div class="form-group">
                <label>Confirm New Password</label>
                <input type="password" id="confirm_password" class="form-control" required placeholder="Repeat new password">
            </div>

            <button type="submit" class="btn btn-primary btn-block">Reset Password</button>
        </form>
    </div>

    <p id="message" class="success-msg hidden"></p>
    <p id="error" class="error-msg hidden"></p>

    <p class="switch-auth">
        Remembered it? <a href="{% url 'ecommerce:login' %}" style="color: var(--primary); font-weight: 600; text-decoration: none;">Sign In</a>
    </p>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const verifyForm = document.getElementById('verify-form');
        const resetForm = document.getElementById('reset-form');
        const resetSection = document.getElementById('reset-section');
        const messageEl = document.getElementById('message');
        const errorEl = document.getElementById('error');

        const showMessage = (msg, isError = false) => {
            messageEl.classList.add('hidden');
            errorEl.classList.add('hidden');
            const el = isError ? errorEl : messageEl;
            el.textContent = msg;
            el.classList.remove('hidden');
        };

        verifyForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                email: document.getElementById('email').value,
                security_question: document.getElementById('security_question').value,
                security_answer: document.getElementById('security_answer').value
            };

            try {
                const response = await fetch("{% url 'ecommerce:verify_security_answer' %}", {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': '{{ csrf_token }}'
                    },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                
                if (response.ok) {
                    resetSection.classList.remove('hidden');
                    showMessage(result.message);
                    // Disable verify form
                    verifyForm.querySelectorAll('input, select, button').forEach(el => el.disabled = true);
                } else {
                    showMessage(result.message || 'Verification failed.', true);
                }
            } catch (err) {
                showMessage('An error occurred. Please try again.', true);
            }
        });

        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('new_password').value;
            const confirmPassword = document.getElementById('confirm_password').value;

            if (newPassword !== confirmPassword) {
                showMessage('Passwords do not match.', true);
                return;
            }

            const data = {
                email: document.getElementById('email').value,
                security_question: document.getElementById('security_question').value,
                security_answer: document.getElementById('security_answer').value,
                new_password: newPassword
            };

            try {
                const response = await fetch("{% url 'ecommerce:reset_password_security' %}", {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': '{{ csrf_token }}'
                    },
                    body: JSON.stringify(data)
                });
                const result = await response.json();

                if (response.ok) {
                    showMessage(result.message + ' Redirecting to login...');
                    setTimeout(() => {
                        window.location.href = "{% url 'ecommerce:login' %}";
                    }, 2000);
                } else {
                    showMessage(result.message || 'Reset failed.', true);
                }
            } catch (err) {
                showMessage('An error occurred. Please try again.', true);
            }
        });
    });
</script>
{% endblock %}
